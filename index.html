<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bill of Supply - Pravash Travels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; color: #000; }
        body { background-color: #e0e0e0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .bill-wrapper { 
            width: 100%; 
            max-width: 800px; 
            background-color: #fff; 
            padding: 20px; 
            border: 2px solid #000;
            display: flex; flex-direction: column;
        }

        .main-title { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        
        .outer-matrix { border: 1px solid #000; }
        .header-block { padding: 10px; border-bottom: 1px solid #000; }
        
        .field-row { display: flex; margin-bottom: 5px; }
        .fill-blank { border: none; border-bottom: 1px dashed #000; flex: 1; outline: none; }
        
        .two-column-split { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #000; }
        .col-box { padding: 10px; }
        .col-box:first-child { border-right: 1px solid #000; }
        
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { border: 1px solid #000; padding: 5px; text-align: center; }
        
        .cell-input { width: 100%; border: none; outline: none; }
        
        .total-section { padding: 10px; text-align: right; border-bottom: 1px solid #000; }
        
        .signature-area { display: flex; justify-content: space-between; padding: 10px; }
        .sig-canvas { border: 1px dashed #000; width: 150px; height: 50px; }
        
        @media print {
            body { background-color: #fff; padding: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <div class="bill-wrapper" id="billContents">
        <div class="main-title">Bill of Supply</div>
        <div class="outer-matrix">
            <div class="header-block">
                <strong>PRAVASH TOUR AND TRAVELS</strong><br>
                <span>DRIVER: Rajit Yadav | CAR: MH04LY5124</span>
            </div>
            <div class="two-column-split">
                <div class="col-box">Bill To: <input type="text" class="fill-blank" placeholder="Name"></div>
                <div class="col-box">Date: <input type="text" class="fill-blank" value="19/07/2026"></div>
            </div>
            <table class="data-table" id="itemsTable">
                <thead><tr><th>#</th><th>Trip Details</th><th>Price</th><th>Amount</th></tr></thead>
                <tbody>
                    <tr><td>1</td><td><input type="text" class="cell-input"></td><td><input type="text" class="cell-input"></td><td><input type="text" class="cell-input"></td></tr>
                </tbody>
            </table>
            <div class="total-section"><strong>Total:</strong> <input type="text" class="fill-blank" style="width: 100px;"></div>
            <div class="signature-area">
                <div>Customer Signature:<br><canvas class="sig-canvas"></canvas></div>
                <div>Authorized Signatory</div>
            </div>
        </div>
    </div>
    <button class="no-print" onclick="window.print()" style="margin-top: 10px; padding: 10px 20px;">Print Bill</button>
</body>
</html
