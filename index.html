<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Pravash Tour and Travels Bill</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Add your existing CSS styles here */
        .bill-wrapper { padding: 20px; font-family: sans-serif; }
        .cell-input { width: 90%; border: 1px solid #ccc; padding: 5px; }
        .select-input { width: 95%; padding: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { border: 1px solid #000; padding: 8px; }
        .footer-section { margin-top: 15px; }
    </style>
</head>
<body>

<div id="billContents" class="bill-wrapper">
    <h2>PRAVASH TOUR AND TRAVELS</h2>
    <input type="text" id="invoice_no" placeholder="Invoice No">
    <input type="text" id="invoice_date" placeholder="Date">
    <input type="text" id="cust_name" placeholder="Customer Name">
    <input type="text" id="cust_phone" placeholder="Customer Phone">

    <table id="itemsTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Trip Details</th>
                <th>Price</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="text-align: center;" class="row-num">1</td>
                <td>
                    <select class="select-input text-target selection-field">
                        <option value="">-- Select Trip Detail --</option>
                        <option value="One way trip">One way trip</option>
                        <option value="Two way trip">Two way trip</option>
                        <option value="Rental (8h.80km)">Rental (8h.80km)</option>
                    </select>
                </td>
                <td><input type="text" class="cell-input align-right price-input text-target" oninput="calculateTotals()"></td>
                <td><input type="text" class="cell-input align-right amt-input text-target" oninput="calculateTotals()"></td>
            </tr>
        </tbody>
    </table>

    <button onclick="addNewRow()">Add Row</button>

    <div class="footer-section">
        <label>Location:</label>
        <input type="text" id="bill_location" class="text-target" placeholder="Enter Location" style="width: 80%; padding: 5px;">
        <br><br>
        <label>Sub Total:</label> <input type="text" id="sub_total" readonly>
        <br>
        <label>Total Amount:</label> <input type="text" id="total_amount" readonly>
    </div>
    
    <canvas id="signatureCanvas" width="300" height="100" style="border:1px solid #000; margin-top:10px;"></canvas>
</div>

<script>
    const canvas = document.getElementById('signatureCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Signature functions
    function initializeSignatureCanvas() {
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { if(isDrawing) { /* draw logic */ } });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) { /* draw logic */ } });
        canvas.addEventListener('mouseup', () => isDrawing = false);
    }

    // Add New Row: Dropdown only in 1st col, others normal input
    function addNewRow() {
        const tableBody = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
        const nextIndex = tableBody.rows.length + 1;
        const newRow = tableBody.insertRow();
        newRow.innerHTML = `
            <td style="text-align: center;" class="row-num">${nextIndex}</td>
            <td>
                <select class="select-input text-target selection-field">
                    <option value="">-- Select Trip Detail --</option>
                    <option value="One way trip">One way trip</option>
                    <option value="Two way trip">Two way trip</option>
                    <option value="Rental (8h.80km)">Rental (8h.80km)</option>
                </select>
            </td>
            <td><input type="text" class="cell-input align-right price-input text-target" oninput="calculateTotals()"></td>
            <td><input type="text" class="cell-input align-right amt-input text-target" oninput="calculateTotals()"></td>
        `;
    }

    function calculateTotals() {
        let runningSubTotal = 0;
        const amtInputs = document.querySelectorAll('.amt-input');
        const priceInputs = document.querySelectorAll('.price-input');
        
        amtInputs.forEach((input, index) => {
            let val = parseFloat(input.value) || 0;
            if (val === 0) val = parseFloat(priceInputs[index].value) || 0;
            runningSubTotal += val;
        });

        document.getElementById('sub_total').value = runningSubTotal.toFixed(2);
        document.getElementById('total_amount').value = runningSubTotal.toFixed(2);
    }

    function preProcessDOMBeforeRender(target) {
        const editableInputs = target.querySelectorAll('input');
        editableInputs.forEach(input => input.setAttribute('value', input.value));
        
        const selects = target.querySelectorAll('select');
        selects.forEach(select => {
            const span = document.createElement('span');
            span.className = 'temp-span-fix';
            span.innerText = select.value || " ";
            select.parentNode.appendChild(span);
            select.style.display = 'none';
        });
    }

    function postProcessDOMAfterRender(target) {
        target.querySelectorAll('.temp-span-fix').forEach(s => s.remove());
        target.querySelectorAll('select').forEach(s => s.style.display = 'block');
    }

    // Initialize
    initializeSignatureCanvas();
</script>
</body>
</html>
